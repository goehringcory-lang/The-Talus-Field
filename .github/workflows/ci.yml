# CI for the PWA and the Worker.
#
# The editorial site at the repo root is static by design (hand-written CSS,
# jsx sources precompiled into /dist by scripts/gen-compiled.mjs). Its guards
# run locally via `npm --prefix scripts run check`; the nightly
# system-checks.yml covers the live site. It is intentionally not built here.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pwa:
    name: PWA build and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/guide
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/guide/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  worker:
    name: Worker typecheck and flow test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Hermetic purchase-flow e2e (mocked KV, stubbed Stripe/Resend): checkout,
      # webhook provisioning, auth exchange/login, refund revocation.
      - run: npm run test:flow
