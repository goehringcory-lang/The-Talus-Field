# CI for the PWA and the Worker.
#
# The editorial site at the repo root has no build, no lint, and no tests by
# design (in-browser Babel, hand-written CSS). It is intentionally not covered
# here; runtime errors surface in the browser.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pwa:
    name: PWA build and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/guide
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/guide/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  worker:
    name: Worker typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - run: npm run typecheck
