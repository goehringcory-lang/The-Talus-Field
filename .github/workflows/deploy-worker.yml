# Auto-deploys the Cloudflare Worker (workers/) when changes under workers/
# land on main. Editorial-only commits do not trigger a deploy.
#
# Required repo secret (Settings → Secrets and variables → Actions → New):
#   CLOUDFLARE_API_TOKEN  — mint at https://dash.cloudflare.com/profile/api-tokens
#                           using the "Edit Cloudflare Workers" template, scoped
#                           to the account that owns thetalusfieldjournal.com.
#
# Manual run: Actions tab → "Deploy Worker" → Run workflow (uses workflow_dispatch).

name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: workers
