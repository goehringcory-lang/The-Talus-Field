# Guard against commits stranded on an already-merged branch.
#
# Deploys only happen from main, and a merged pull request is closed for
# good: pushing more commits to its branch does not reopen it, so the work
# silently never ships. This happened on PR #219 (merged within a minute of
# creation, while the session was still pushing follow-up work).
#
# On every non-main branch push: if the branch has a merged PR, no open PR,
# and commits ahead of main, fail the run and comment on the merged PR so
# the gap surfaces exactly where the merge happened. A brand-new branch with
# no PR yet stays quiet (the PR is usually opened right after the first
# push), and once a fresh PR is open for the branch this check passes.

name: Stranded commits guard

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: Detect commits pushed after merge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch against its pull requests
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          open_prs=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$open_prs" -gt 0 ]; then
            echo "An open PR exists for $BRANCH; nothing stranded."
            exit 0
          fi

          merged_pr=$(gh pr list --head "$BRANCH" --state merged --json number --jq '.[0].number // empty')
          if [ -z "$merged_pr" ]; then
            echo "No merged PR for $BRANCH; assuming one will be opened for it."
            exit 0
          fi

          git fetch origin main --quiet
          ahead=$(git rev-list --count "origin/main..origin/$BRANCH")
          if [ "$ahead" -eq 0 ]; then
            echo "Branch carries nothing beyond main."
            exit 0
          fi

          commits=$(git log --format='- %h %s' "origin/main..origin/$BRANCH" | head -20)
          gh pr comment "$merged_pr" --body "$(printf 'This PR is merged, but %s new commit(s) were pushed to `%s` afterwards. They are not in `main` and will not deploy.\n\n%s\n\nTo ship them: open a new pull request for `%s` (the branch has been kept rebased on `main` for this).' "$ahead" "$BRANCH" "$commits" "$BRANCH")"
          echo "::error::$ahead commit(s) on $BRANCH were pushed after PR #$merged_pr merged and have no open PR. Open a new PR to ship them."
          exit 1
