name = "talus-field-guide-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Replace `id` with the value printed by:
#   wrangler kv namespace create GUIDE_BUYERS
# Replace `preview_id` with the value from:
#   wrangler kv namespace create GUIDE_BUYERS --preview
# Besides buyer records, this namespace also holds the /api/trip calendar
# feeds: tripfeed:<token> (the published ICS) and tripfeedToken:<sub> (the
# owner's reuse pointer), both on a 400-day TTL refreshed by every publish,
# plus the hourly tripfeedWriteAttempts:* rate-limit counters. It also holds
# the /api/calendar Google push state: gcal:<sub> (refresh token, no TTL),
# gcalAccess:<sub> (cached access token), gcalEvents:<sub> (uid→eventId map),
# gcalstate:<state> (10-min OAuth handoff), and gcalSyncAttempts:* counters.
[[kv_namespaces]]
binding = "GUIDE_BUYERS"
id = "REPLACE_ME_AFTER_kv_namespace_create"
preview_id = "REPLACE_ME_FOR_LOCAL_DEV"

# Program/event cache for /api/programs (daily cron ingest of the NPS Events
# API). Create with:
#   wrangler kv namespace create GUIDE_PROGRAMS
#   wrangler kv namespace create GUIDE_PROGRAMS --preview
[[kv_namespaces]]
binding = "GUIDE_PROGRAMS"
id = "REPLACE_ME_AFTER_kv_namespace_create"
preview_id = "REPLACE_ME_FOR_LOCAL_DEV"

# Daily program ingest, ~2-3am Pacific. The route also self-heals: if KV is
# missing or >48h old it fetches NPS live and backfills.
[triggers]
crons = ["0 10 * * *"]

# APP_BASE_URL is the PWA's public origin. It feeds every buyer-facing link
# the Worker emits: the magic-link (`${APP_BASE_URL}/open?token=`), the access
# email's wordmark image and /login links (email.ts derives them from it), and
# the CORS fallback origin. It currently points at the Cloudflare Pages URL the
# app actually serves from; switch it to https://guide.thetalusfieldjournal.com
# once that custom domain is attached to the Pages project.
#
# These MUST live under [vars]. As bare keys after [triggers] above, TOML
# folds them into the triggers table and wrangler drops them, leaving
# c.env.APP_BASE_URL and friends undefined at runtime.
[vars]
APP_BASE_URL = "https://talus-field-guide.pages.dev"
EDITORIAL_BASE_URL = "https://thetalusfieldjournal.com"
GUIDE_PRICE_CENTS = "1900"
GUIDE_PRODUCT_TAG = "field_guide_2026"
GUIDE_MONTHLY_CAP = "100"
# Google OAuth client id for the calendar push (/api/calendar). Public
# identifier, safe to commit. Paired with the GOOGLE_OAUTH_CLIENT_SECRET secret.
# Leave the placeholder until the OAuth client exists: the Worker treats any
# REPLACE_WITH-prefixed id as unconfigured, /google/start answers 503, and the
# PWA's Account card falls back to the Google add-by-URL feed subscription
# (which needs no Google Cloud setup) instead of a Connect button that fails.
GOOGLE_OAUTH_CLIENT_ID = "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com"

# Routes the Worker to api.thetalusfieldjournal.com.
# DNS prerequisite: in Cloudflare DNS, add a CNAME `api` -> `<worker-name>.workers.dev`
# (or use the AAAA shortcut Cloudflare offers when you assign a custom route).
[[routes]]
pattern = "api.thetalusfieldjournal.com/*"
zone_name = "thetalusfieldjournal.com"

# === Pre-Stripe dev / admin sign-in =========================================
# /api/auth/dev-login accepts a username + code pair and issues the same JWT
# the post-purchase login does, so we can preview the PWA without Stripe.
# Set both pairs as secrets:
#   wrangler secret put DEV_USERNAME      # e.g. "preview"
#   wrangler secret put DEV_CODE          # any string you'll remember
#   wrangler secret put ADMIN_USERNAME    # e.g. "cory"
#   wrangler secret put ADMIN_CODE        # any string you'll remember
# Either pair lets you in. Remove or rotate before public launch.
# ===========================================================================

# === NPS Events API =========================================================
# /api/programs and the daily cron read the National Park Service Events API.
# Free key, self-serve signup at developer.nps.gov/get-started:
#   wrangler secret put NPS_API_KEY
# Optional; without it the feed serves manual curation only.
# ===========================================================================

# === IndexNow push-indexing =================================================
# /api/indexnow/submit forwards URL lists to api.indexnow.org so Bing,
# Yandex, Seznam, Naver, and Yep all see the change at once. Both secrets
# are required for the endpoint to function:
#   wrangler secret put INDEXNOW_KEY           # the 32-char hex string also
#                                              # served at /<key>.txt
#   wrangler secret put INDEXNOW_ADMIN_TOKEN   # gates POST /api/indexnow/submit
# Without them the route returns 503. See scripts/indexnow-ping.sh.
# ===========================================================================

# === Google Calendar push ===================================================
# /api/calendar/google/* runs an OAuth code flow and pushes the trip plan into
# the buyer's primary Google calendar. Create a Web-application OAuth client in
# the Google Cloud console (enable the Google Calendar API first), with these
# authorized redirect URIs:
#   https://api.thetalusfieldjournal.com/api/calendar/google/callback
#   http://localhost:8787/api/calendar/google/callback   (wrangler dev)
# Consent-screen scopes: openid, userinfo.email, .../auth/calendar.events.
# Put the client id in [vars] above, and the secret here:
#   wrangler secret put GOOGLE_OAUTH_CLIENT_SECRET
# calendar.events is a sensitive scope: submit the app for verification before
# public launch (Testing mode works immediately for added test users).
# ===========================================================================

# === Local dev override ====================================================
# For local development, copy this file to wrangler.local.toml and replace
# the URLs above with their localhost equivalents. wrangler picks it up via:
#   wrangler dev --config wrangler.local.toml
# ===========================================================================
