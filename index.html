        <ul>
          <li><a href="/articles/getting-to-yosemite">Getting to Yosemite: Five Entrances, and How to Pick the Right One</a>: Yosemite has five entrances and they are nothing alike. Which highway fits which trip, real drive times, why your phone's routing cannot be trusted, what winter chain control means, and the YARTS bus that solves parking entirely.</li>
          <li><a href="/articles/yosemite-wilderness-permits-guide">The Yosemite Wilderness Permit, Explained</a>: Ninety-five percent of Yosemite is wilderness, and sleeping in it takes a permit most visitors never figure out. The 24-week lottery, the seven-day release, the Half Dome add-on, and the strategy that actually gets you out there.</li>
          <li><a href="/articles/yosemite-accessibility-guide">An Accessible Yosemite: What Works, and How to Plan for It</a>: The best view in Yosemite Valley is from a flat, paved loop. Wheelchair-accessible trails, the accessible Valley shuttle, Deaf services, the free Access Pass, and the planning arithmetic the brochures soften.</li>
          <li><a href="/articles/pets-in-yosemite">Bringing a Dog to Yosemite: The Rules, the Two Trails, and an Honest Answer</a>: Yosemite is one of the least dog-friendly parks in the country, by design, and nobody tells you before the drive. Where a leashed dog can actually go, the two legal trails, campground rules, and when to leave the dog home.</li>
          <li><a href="/articles/yosemite-ranger-programs">The Best Thing in Yosemite Is Free: Ranger Programs and the Junior Ranger Badge</a>: Guided walks, evening amphitheater programs, and a badge ceremony performed with complete seriousness for five-year-olds and forty-five-year-olds alike. How to find the schedule and which program to pick if you only attend one.</li>
          <li><a href="/articles/yosemite-camping-complete-guide">The Dirt on Camping in Yosemite: All 13 Campgrounds</a>: Thirteen campgrounds, three booking windows, and a bear box you will come to respect. Twenty years of sleeping on this ground: how to get a site when they vanish in minutes, which campgrounds are worth it, and where to go when everything is full.</li>
          <li><a href="/articles/where-to-propose-in-yosemite">Where to Propose in Yosemite: What Twenty Years of Watching Taught Me</a>: A naturalist who has watched hundreds of proposals on which Yosemite spots actually work, which famous overlooks are too crowded to bother with, the regulations nobody mentions, and why the simplest moments are the ones that land.</li>
          <li><a href="/articles/yosemite-bears-safety-guide">The Bear Spray You Packed for Yosemite Is Illegal</a>: Bear spray is illegal in Yosemite, and so is most of what you think you know about bears. A naturalist debunks six myths and explains what actually keeps you safe.</li>
          <li><a href="/articles/yosemite-heat-safety-guide">Yosemite Heat Safety: A Naturalist's Survival Guide</a>: Yosemite Valley is a granite oven in July and August. A naturalist on which trails will cook you, the water math, where to swim safely, and how to escape the heat uphill.</li>
          <li><a href="/articles/when-to-visit-yosemite-2026-crowd-forecast">When to Visit Yosemite in 2026: What the Traffic Data Says</a>: The reservation system is gone and the park is pacing toward its second-busiest year ever. A decade of NPS visitation data, a month-by-month forecast for the rest of 2026, and the days that still work.</li>
          <li><a href="/articles/yosemite-trip-cost-budget-2026">What a Yosemite Trip Actually Costs in 2026</a>: Entrance fees, lodging, food, gas, gear, and guided programs, with real 2026 numbers and three full trip totals: shoestring, comfortable mid-range, and splurge.</li>
          <li><a href="/articles/yosemite-in-june-2026">Yosemite in June 2026: Two Junes, One Month</a>: Low snowpack pushed everything earlier and the reservation system is gone. The waterfalls, the road openings, the crowds, the bears, and how to plan for the June you are actually getting.</li>
          <li><a href="/articles/cathedral-lakes-day-hike">Cathedral Lakes: the high-country day hike worth driving up for</a>: The standard high-country day hike out of Tuolumne Meadows, and it still earns the listing. Trail distance, elevation, the best months, what to actually look at, and how to do Lower and Upper Cathedral Lakes well.</li>
          <li><a href="/articles/yosemite-needs-a-reservation-system">Yosemite needs a reservation system</a>: Dropping the reservation system fails the park on both halves of its mission: this Memorial Day weekend, visitors couldn't recreate and the meadows took the damage. A naturalist's case for bringing it back.</li>
          <li><a href="/articles/memorial-day-skip-the-valley-go-high-2026">So you decided to come to Yosemite on Memorial Day. What are you thinking?</a>: Yosemite Valley will be a parking lot on Memorial Day weekend 2026. With Tioga Road and Glacier Point Road both open early, the move is to skip the Valley and spend the weekend 4,000 feet up in the high country.</li>
          <li><a href="/articles/where-to-eat-yosemite">Where to eat in and around Yosemite</a>: Eight or nine restaurants worth knowing in and around Yosemite. The Half Dome pizza, the Mariposa brisket, the east-side coffee. Nothing else, and nothing chain.</li>
          <li><a href="/articles/yosemite-in-one-or-two-days">One day in Yosemite: a minimalist itinerary for one or two days</a>: One day in Yosemite is enough if you start early and do less. A deliberate one-or-two-day itinerary for 2026: the Valley waterfall sequence, what to skip, and what a second day above the floor earns you.</li>
          <li><a href="/articles/four-mile-up-panorama-down">My favorite day hike in Yosemite: Four Mile up, Panorama down</a>: Up the Four Mile Trail to Glacier Point, down the Panorama Trail past Illilouette and Nevada Falls. A 13-mile loop that climbs 3,200 feet and gives you back the whole park. The logistics that make it work.</li>
          <li><a href="/articles/yosemite-with-kids-no-reservations-2026">Your last-minute Yosemite trip with kids: a naturalist's honest guide</a>: A senior Yosemite naturalist's honest guide to visiting with kids in 2026, no advance reservations needed. Kid-friendly hikes, timing tricks, YARTS bus tips, and what most families get wrong.</li>
          <li><a href="/articles/tioga-road-opening-weekend-2026">Tioga Road opens May 15: a plan for opening weekend</a>: Tioga Road and Tioga Pass open Friday, May 15, well ahead of the long-term average. What's open in Tuolumne Meadows, the road conditions, the short hikes that actually work in mid-May, and how to make a day of it east to Lee Vining and Mono Lake.</li>
          <li><a href="/articles/so-you-want-to-hike-half-dome">So you want to hike Half Dome</a>: The honest case for the cables, and the better hike most visitors don't know about: Clouds Rest, a thousand feet higher than Half Dome, with bigger views and no permit required.</li>
          <li><a href="/articles/half-dome-permit-lottery-2026">How the Half Dome permit lottery actually works</a>: There are two lotteries, not one. The preseason in March and the daily lottery every day the cables are up. The real odds, the strategy that works, and what to do if you don't win.</li>
          <li><a href="/articles/glacier-point-road-open-2026">Glacier Point Road is open: a plan for the early season</a>: The road climbs seventeen miles to a viewpoint at 7,200 feet that puts you at eye level with Half Dome. What is open at the top, what is not, and how to think about the first weeks of the 2026 season.</li>
          <li><a href="/articles/mist-trail-the-real-guide">The Mist Trail: everything the internet isn't telling you</a>: The most hiked trail in any national park generates more questions than every other Yosemite trail combined. The honest answers about shoes, water, when to go, and whether you can actually die out there.</li>
          <li><a href="/articles/working-in-yosemite">So you want to work in Yosemite</a>: Most jobs in Yosemite aren't ranger jobs. The work is hospitality, the housing starts in a tent cabin, and the closest grocery store is an hour away. The honest version of what it's like to live here, before you sign anything.</li>
          <li><a href="/articles/water-ouzels-waterfalls">How water ouzels live inside a waterfall</a>: A robin-sized bird walks directly into Yosemite Falls and stays there. The water ouzel is the most specialized animal in the high country, and its presence tells you the stream is healthy.</li>
          <li><a href="/articles/bears-spring-emergence">Why a Yosemite bear in April is more dangerous than one in August</a>: A bear emerging from a winter den has lost a third of its body weight, has a digestive system that's barely awake, and is metabolically desperate. That's why spring, not summer, is the dangerous season.</li>
          <li><a href="/articles/yosemite-glaciers-climate">Yosemite's disappearing glaciers, and what they record</a>: A ranger built a cairn at the toe of Mount Lyell Glacier in 1933. That cairn is now four hundred feet from the ice. The retreat is also a record of climate, written into the High Sierra in something like real time.</li>
          <li><a href="/articles/giant-sequoias-fire-adaptation">Why giant sequoias thrive where other trees burn</a>: The same fires that kill every other tree in the Sierra are the ones the giant sequoia depends on. Two-foot bark, embedded tannins, and a seedling ecology that fails without burning.</li>
          <li><a href="/articles/hetch-hetchy-the-other-yosemite-valley">Hetch Hetchy: the Yosemite Valley you didn't know you skipped</a>: Same elevation. Same length. Same kind of granite. Carved by the same kind of glacier as the famous one, and still mostly empty of visitors. Why almost no one goes, and why you should.</li>
          <li><a href="/articles/yosemite-stargazing-where-to-look-up">Yosemite stargazing: where to look up, and when</a>: On a moonless August night at Olmsted Point, the Milky Way doesn't look like a thin band. It casts shadows. Where to go, when to go, and how to see the sky the way our ancestors did.</li>
          <li><a href="/articles/yosemite-for-non-hikers">Yosemite for non-hikers: the park you can experience without a trail</a>: Yosemite is built for non-hikers more thoroughly than almost any park in the country. A complete visit is possible without ever putting on hiking boots. Here's how to plan one.</li>
          <li><a href="/articles/pack-your-car-for-yosemite">How to pack your car for a Yosemite trip</a>: Nobody writes about packing the car. But the car is the base camp for most Yosemite trips, and what's in it decides whether a flat tire is an inconvenience or a crisis.</li>
          <li><a href="/articles/yosemite-gateway-towns-compared">Yosemite gateway towns compared: which one to base in</a>: Pick the wrong gateway town and you'll burn hours of every day on the road. Pick the right one and the rest of the trip gets easier. A side-by-side from someone who's stayed in all five.</li>
          <li><a href="/articles/yosemite-during-smoke-season">Yosemite during smoke season: how to actually plan around it</a>: Smoke season in California now runs July through October. The question isn't whether your trip will overlap with it. It's whether you have a plan for when it does.</li>
          <li><a href="/articles/yosemite-without-reservations-2026">Yosemite without reservations in 2026: a real strategy for the year the cap came off</a>: The reservation system was a throttle. With it gone in 2026, the park hasn't gotten easier. It's gotten harder. Here's the real strategy.</li>
          <li><a href="/articles/first-time-yosemite-overwhelm">If it's your first time in Yosemite, read this before you book anything</a>: The bucket list isn't the problem. The strategy is. Three things turn a Yosemite visit from “we saw the things” into one of the best weeks of your life.</li>
