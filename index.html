        <h2>Articles</h2>
        <ul>
          <li><a href="/articles/yosemite-with-kids-no-reservations-2026">Your last-minute Yosemite trip with kids: a naturalist's honest guide</a> — A senior naturalist's honest guide to visiting with kids in 2026, no advance reservations needed. Kid-friendly hikes, timing, YARTS, and what most families get wrong.</li>
          <li><a href="/articles/tioga-road-opening-weekend-2026">Tioga Road opens May 15: a plan for opening weekend</a> — Highway 120 opens Friday, well ahead of the long-term average. What's open in Tuolumne Meadows, conditions, hikes, and stops.</li>
          <li><a href="/articles/so-you-want-to-hike-half-dome">So you want to hike Half Dome</a> — The honest case for the cables, and the better hike most visitors don't know about: Clouds Rest, a thousand feet higher and no permit required.</li>
          <li><a href="/articles/half-dome-permit-lottery-2026">How the Half Dome permit lottery actually works</a> — There are two lotteries, not one. The preseason in March and the daily lottery every day the cables are up. Real odds and a strategy that works.</li>
          <li><a href="/articles/glacier-point-road-open-2026">Glacier Point Road is open: a plan for the early season</a> — Seventeen miles to a 7,200-foot viewpoint at eye level with Half Dome. What's open at the top and how to plan the first weeks.</li>
          <li><a href="/articles/mist-trail-the-real-guide">The Mist Trail: everything the internet isn't telling you</a> — The most hiked trail in any national park, demystified. Shoes, water, safety, and when to go.</li>
          <li><a href="/articles/working-in-yosemite">So you want to work in Yosemite</a> — Most jobs in Yosemite aren't ranger jobs. The honest version of what it's like to live here.</li>
          <li><a href="/articles/water-ouzels-waterfalls">How water ouzels live inside a waterfall</a> — A robin-sized bird walks directly into Yosemite Falls and stays there.</li>
          <li><a href="/articles/bears-spring-emergence">Why a Yosemite bear in April is more dangerous than one in August</a> — Spring, not summer, is the dangerous season for bears.</li>
          <li><a href="/articles/yosemite-glaciers-climate">Yosemite's disappearing glaciers, and what they record</a> — A 1933 cairn at Mount Lyell Glacier is now four hundred feet from the ice.</li>
          <li><a href="/articles/giant-sequoias-fire-adaptation">Why giant sequoias thrive where other trees burn</a> — Two-foot bark, embedded tannins, and seedling ecology that fails without fire.</li>
          <li><a href="/articles/hetch-hetchy-the-other-yosemite-valley">Hetch Hetchy: the Yosemite Valley you didn't know you skipped</a> — Same elevation, same granite, mostly empty.</li>
