<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.v2.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preload" href="/fonts/eb-garamond.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/eb-garamond-italic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Browser chrome follows the app's palette in both schemes; the dark
         value is --paper from the dark block in tokens.css. -->
    <meta name="theme-color" content="#f1ead6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1812" media="(prefers-color-scheme: dark)" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Social unfurl for shared links (stop pages, /preview). One static
         card for every route; absolute URLs are required by scrapers, and the
         pages.dev host keeps resolving after the custom domain attaches. -->
    <meta
      name="description"
      content="An offline Yosemite field guide: four regional guides with tappable GPS, the Secret Guide, and a topo map of the whole park. One payment, 18 months, every device you own."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Talus Field" />
    <meta property="og:title" content="Yosemite Field Guide · The Talus Field" />
    <meta
      property="og:description"
      content="An offline Yosemite field guide: four regional guides with tappable GPS, the Secret Guide, and a topo map of the whole park. One payment, 18 months, every device you own."
    />
    <meta property="og:image" content="https://talus-field-guide.pages.dev/photos/tunnel-view.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="apple-mobile-web-app-title" content="Yosemite Guide" />
    <!-- Standalone-app chrome when launched from the home screen. "default"
         status bar keeps legible dark-on-light matching theme-color; the
         black-translucent variant would need safe-area CSS work. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Yosemite Field Guide · The Talus Field</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
